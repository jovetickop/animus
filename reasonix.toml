allow = ["Bash(cd D:/code/ty-qt-ai-plugin/docs && for f in task-*.md; do echo \"=== $f ===\"; head -3 \"$f\"; echo; done)", "Edit", "Bash(cd D:/code/ty-qt-ai-plugin && python scripts/temp-fix-roadmap.py)", "Bash(cd D:/code/ty-qt-ai-plugin && git add docs/guide.md docs/task-05-QuickDev.md docs/task-07-对抗性审查.md && git commit -m \"feat: 合并 BMAD bug 修复策略\n\ndebug 路径：\n- 4 步诊断流程：3 问定位 → 无法复现穷举分析 → 分层诊断 → 5 类分诊\n- 分层诊断：意图层/规范层/实现层，不在错误层级修 bug\n- 无法复现分支：日志狩猎/路径穷举/埋点策略/环境差异\n\n审查门控：\n- 5 类分诊：intent_gap/bad_spec/patch/defer/reject\n- defer 机制：存量问题记入 deferred-work.md，不打断主线\n- 处理顺序：先处理 intent_gap 和 bad_spec，再处理 patch\")", "Bash(cd D:/code/ty-qt-ai-plugin && git add commands/animus-dev.md commands/animus-review.md agents/universal/code-reviewer.md agents/universal/edge-case-hunter.md agents/universal/acceptance-auditor.md agents/universal/ponytail-reviewer.md scripts/deferred_work.py && git commit -m \"feat: 合并 BMAD bug 修复策略到项目代码\n\ncommands/animus-dev.md:\n- debug 路径扩展为 4 步诊断（定位→穷举→分层→分诊）\n- 新增无法复现分支、分层诊断（意图/规范/实现）、5 类分诊\n- 新增 deferred-work 机制说明\n\ncommands/animus-review.md:\n- 完整重写：4 agent 并行审查 + 门控规则 + 5 类分诊 + 循环回退\n- 新增 defer 记录格式、语言专项检查\n\nagents/:\n- code-reviewer: 每条输出加 triage 标签（intent_gap/bad_spec/patch/defer/reject）\n- edge-case-hunter: 输出追加 triage 标签（patch/defer/reject）\n- acceptance-auditor: FAIL 项标注 bad_spec/patch/defer\n- ponytail-reviewer: 输出追加 [patch]/[defer] 标签\n\nscripts/deferred_work.py: 新增 defer 管理模块（read/append_entry/clear）\")"]
